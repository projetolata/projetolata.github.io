<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Interativo - Atlas</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <link rel="stylesheet" href="style.css" />
    
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100vw; }
        
        .info-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(255, 255, 255, 0.97);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            z-index: 1000;
            max-width: 300px;
        }
        button {
            margin: 6px 4px;
            padding: 10px 14px;
            border: none;
            border-radius: 6px;
            background: #0066cc;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #0052a3; }
        .delete-btn { background: #d32f2f; }
        .delete-btn:hover { background: #b71c1c; }
    </style>
</head>
<body>
    <div id="map"></div>

    <div class="info-panel">
        <h3>🗺️ Atlas Interativo</h3>
        <button onclick="adicionarPinManual()">➕ Pin Manual</button><br>
        <button onclick="limparTudo()" class="delete-btn">🗑️ Limpar Tudo</button><br><br>
        <button onclick="exportarDados()">📤 Exportar</button>
        <button onclick="importarDados()">📥 Importar</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="script.js"></script>
</body>
</html>
